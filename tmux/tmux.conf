# Cairn Gate Labs — federation tmux config
#
# Project-local. Loaded via `cgl-tmux` (which invokes `tmux -f` against this file).
# Your global ~/.tmux.conf is NOT read in this session. Other tmux sessions on
# the machine are unaffected.
#
# Reversibility: delete this file and the script; nothing else changes.
# See: ADR-0007 (forthcoming) for the architectural rationale.

# ── Defaults ───────────────────────────────────────────────────────────────────

# 256-color + truecolor. Modern terminals.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,*256col*:RGB"

# Mouse support — easy pane switching, scrollback.
set -g mouse on

# Larger scrollback than default.
set -g history-limit 50000

# Window/pane numbering starts at 1 (0 is far from the home row).
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one closes (no gaps in window list).
set -g renumber-windows on

# Faster command sequences.
set -s escape-time 10

# Don't rename windows automatically — we name them ourselves per arm.
set -g allow-rename off
setw -g automatic-rename off

# ── Prefix key ─────────────────────────────────────────────────────────────────

# Default Ctrl-b is fine. Not overriding so muscle memory carries over from
# anyone's global config when they sit down at the federation session.

# ── Status bar ─────────────────────────────────────────────────────────────────

set -g status on
set -g status-interval 5
set -g status-position bottom

# Left: session name + indicator that this is the cairn-gate-labs federation
set -g status-left-length 40
set -g status-left "#[fg=#c5b08a,bold] cgl#[fg=#a8a29e] federation #[fg=#57534e]│ "

# Right: current branch in active pane's cwd + clock
set -g status-right-length 80
set -g status-right "#[fg=#a8a29e]#(cd '#{pane_current_path}' 2>/dev/null && git rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=#57534e]│ #[fg=#a8a29e]%H:%M "

# Window list — cairnlabs palette
set -g status-style "bg=#1c1917,fg=#a8a29e"
setw -g window-status-format "#[fg=#57534e] #I#[fg=#a8a29e]:#W "
setw -g window-status-current-format "#[fg=#1c1917,bg=#c5b08a,bold] #I:#W #[default]"
setw -g window-status-separator ""

# Pane borders — subtle, not loud
set -g pane-border-style "fg=#2c2927"
set -g pane-active-border-style "fg=#c5b08a"

# Message styling (when tmux prints something)
set -g message-style "fg=#e7e5e4,bg=#2c2927"

# ── Federation-specific keybindings ────────────────────────────────────────────

# `prefix` then `0` jumps to the lab window (constitutional home base).
# Mnemonic: zero is foundational.
bind 0 select-window -t cgl:lab

# `prefix` then `R` reloads this config without restarting the session.
# Useful while iterating on the .tmux.conf itself.
bind R source-file ~/projects/cairn-gate-labs/lab/.tmux.conf \; display "cgl tmux config reloaded"

# `prefix` then `S` shows status across the federation (calls into the director
# skill — same output as `/director status`, in a tmux popup).
bind S display-popup -E -w 90% -h 90% \
    "cd ~/projects/cairn-gate-labs/lab && python3 .claude/skills/director/status.py | less -R"

# `prefix` then `A` (arms) shows just the arms federation table.
bind A display-popup -E -w 90% -h 60% \
    "cd ~/projects/cairn-gate-labs/lab && python3 .claude/skills/director/status.py | awk '/^## Arms/,/^## Decisions/' | less -R"

# `prefix` then `U` shows unreviewed delegation reports across federation.
bind U display-popup -E -w 90% -h 50% \
    "cgl-reports --unreviewed; echo; echo 'press q to close'; read"

# Quick split-pane creation in the same cwd as the current pane
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── End ────────────────────────────────────────────────────────────────────────
